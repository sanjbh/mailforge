<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Subject</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
        }

        .email-container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .email-header {
            background-color: #007BFF;
            color: #ffffff;
            padding: 20px;
            text-align: center;
        }

        .email-header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: bold;
        }

        .email-body {
            padding: 25px;
            color: #333333;
        }

        .email-body p {
            font-size: 16px;
            line-height: 1.6;
        }

        .email-footer {
            background-color: #f1f1f1;
            padding: 20px;
            text-align: center;
            font-size: 14px;
            color: #777777;
        }

        .email-footer a {
            color: #007BFF;
            text-decoration: none;
        }

        .email-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="email-container">
        <div class="email-header">
            <h1>Test Subject</h1>
        </div>
        <div class="email-body">
            <p>Test Body</p>
            <p><strong>From:</strong> Test <test@example.com></p>
            <p><strong>To:</strong> Recipient <recipient@example.com></p>
        </div>
        <div class="email-footer">
            <p>&copy; 2025 Your Company. All rights reserved.</p>
            <p><a href="https://example.com/unsubscribe">Unsubscribe</a> | <a href="https://example.com/view">View in Browser</a></p>
        </div>
    </div>
</body>
</html>
