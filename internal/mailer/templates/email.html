<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Subject }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background-color: #f0f2f5;
            padding: 40px 20px;
        }

        .wrapper {
            max-width: 620px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 36px 40px;
            border-radius: 12px 12px 0 0;
            text-align: center;
        }

        .header .logo {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header .logo span {
            color: #e94560;
        }

        .header .tagline {
            font-size: 12px;
            color: #a0aec0;
            margin-top: 6px;
            letter-spacing: 1px;
        }

        .subject-bar {
            background: #e94560;
            padding: 14px 40px;
            text-align: center;
        }

        .subject-bar h1 {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        .body {
            background: #ffffff;
            padding: 40px;
            line-height: 1.8;
            color: #2d3748;
            font-size: 15px;
        }

        .body p {
            margin-bottom: 16px;
        }

        .body strong {
            color: #1a1a2e;
        }

        .body a {
            color: #e94560;
            text-decoration: none;
            font-weight: 500;
        }

        .body a:hover {
            text-decoration: underline;
        }

        .body ul,
        .body ol {
            padding-left: 20px;
            margin-bottom: 16px;
        }

        .body li {
            margin-bottom: 8px;
        }

        .cta {
            text-align: center;
            margin: 32px 0 16px;
        }

        .cta a {
            background: linear-gradient(135deg, #e94560, #c73652);
            color: #ffffff !important;
            padding: 14px 36px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none !important;
            display: inline-block;
            letter-spacing: 0.5px;
        }

        .divider {
            border: none;
            border-top: 1px solid #e2e8f0;
            margin: 24px 0;
        }

        .meta {
            background: #f7fafc;
            padding: 16px 40px;
            border-top: 1px solid #e2e8f0;
            font-size: 13px;
            color: #718096;
        }

        .meta table {
            width: 100%;
        }

        .meta td {
            padding: 3px 0;
        }

        .meta .label {
            font-weight: 600;
            color: #4a5568;
            width: 50px;
        }

        .footer {
            background: #1a1a2e;
            padding: 24px 40px;
            border-radius: 0 0 12px 12px;
            text-align: center;
        }

        .footer p {
            font-size: 12px;
            color: #718096;
            margin-bottom: 8px;
        }

        .footer a {
            color: #a0aec0;
            text-decoration: none;
            font-size: 12px;
            margin: 0 8px;
        }

        .footer a:hover {
            color: #e94560;
        }
    </style>
</head>

<body>
    <div class="wrapper">

        <div class="header">
            <div class="logo">Compl<span>AI</span></div>
            <div class="tagline">SOC2 Compliance · Powered by AI</div>
        </div>

        <div class="subject-bar">
            <h1>{{ .Subject }}</h1>
        </div>

        <div class="body">
            {{ .Body }}
        </div>

        <div class="meta">
            <table>
                <tr>
                    <td class="label">From:</td>
                    <td>{{ .From }}</td>
                </tr>
                <tr>
                    <td class="label">To:</td>
                    <td>{{ .To }}</td>
                </tr>
            </table>
        </div>

        <div class="footer">
            <p>&copy; 2025 ComplAI. All rights reserved.</p>
            <p>
                <a href="#">Unsubscribe</a>
                <a href="#">View in Browser</a>
                <a href="#">Privacy Policy</a>
            </p>
        </div>

    </div>
</body>

</html>
